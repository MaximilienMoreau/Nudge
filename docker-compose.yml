services:

  # ── PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: nudge-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       nudge
      POSTGRES_USER:     ${DB_USERNAME:-nudge_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - nudge-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-nudge_user} -d nudge"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nudge-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL:          jdbc:postgresql://db:5432/nudge
      DB_USERNAME:     ${DB_USERNAME:-nudge_user}
      DB_PASSWORD:     ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET:      ${JWT_SECRET:?JWT_SECRET is required}
      ENCRYPTION_KEY:  ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      APP_BASE_URL:    ${APP_BASE_URL:-http://localhost:8080}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080}
      OPENAI_API_KEY:  ${OPENAI_API_KEY:-}
      # Email notifications (optional)
      NOTIFICATION_EMAIL_ENABLED: ${NOTIFICATION_EMAIL_ENABLED:-false}
      MAIL_HOST:       ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT:       ${MAIL_PORT:-587}
      MAIL_USERNAME:   ${MAIL_USERNAME:-}
      MAIL_PASSWORD:   ${MAIL_PASSWORD:-}
      NOTIFICATION_EMAIL_FROM: ${NOTIFICATION_EMAIL_FROM:-noreply@nudge.app}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  nudge-db-data:
