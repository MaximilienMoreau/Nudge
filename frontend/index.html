<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nudge — Sign In</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="auth-page">

  <div class="auth-card">
    <!-- Logo -->
    <div class="auth-logo">
      <div class="logo-icon">📨</div>
      <div>
        <h1>Nudge</h1>
        <p>AI-powered email intelligence</p>
      </div>
    </div>

    <!-- Login / Register tabs -->
    <div class="tab-nav">
      <button class="tab-btn active" id="tab-login" onclick="showTab('login')">Sign In</button>
      <button class="tab-btn" id="tab-register" onclick="showTab('register')">Create Account</button>
    </div>

    <!-- Login Form -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required/>
      </div>
      <div id="login-error" style="color: var(--danger); font-size:.85rem; margin-bottom:.75rem; display:none;"></div>
      <button type="submit" class="btn btn-primary btn-block" id="login-btn">
        Sign In
      </button>
    </form>

    <!-- Register Form -->
    <form id="register-form" style="display:none" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min. 8 characters" minlength="8" required/>
      </div>
      <div id="reg-error" style="color: var(--danger); font-size:.85rem; margin-bottom:.75rem; display:none;"></div>
      <button type="submit" class="btn btn-primary btn-block" id="reg-btn">
        Create Account
      </button>
    </form>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
