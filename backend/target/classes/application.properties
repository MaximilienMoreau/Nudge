# ─────────────────────────────────────────────────────────────
#  Nudge Backend — Common Configuration
#  Secrets MUST be supplied via environment variables.
#  Use application-dev.properties for local defaults.
#  Activate profiles: -Dspring.profiles.active=dev|prod
# ─────────────────────────────────────────────────────────────

# Server
server.port=8080

# ── Database ──────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/nudge}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate — migrations managed by Flyway in prod; overridden per profile
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ── Flyway ────────────────────────────────────────────────────
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── JWT ───────────────────────────────────────────────────────
# Must be Base64-encoded and decode to at least 32 bytes (256 bits)
jwt.secret=${JWT_SECRET}
# Token expiry: 24 hours in milliseconds
jwt.expiration=86400000

# ── OpenAI ───────────────────────────────────────────────────
openai.api.key=${OPENAI_API_KEY:}
openai.model=gpt-4o-mini

# ── App ───────────────────────────────────────────────────────
app.base.url=${APP_BASE_URL:http://localhost:8080}

# CORS: comma-separated list of allowed origins
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:3000}

# Trusted proxy CIDR ranges for X-Forwarded-For validation (comma-separated)
app.proxy.trusted-ranges=${TRUSTED_PROXY_RANGES:127.0.0.1,::1}

# ── Email notifications fallback (F5) ────────────────────────
nudge.notifications.email.enabled=${NOTIFICATION_EMAIL_ENABLED:false}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
nudge.notifications.email.from=${NOTIFICATION_EMAIL_FROM:noreply@nudge.app}

# ── Encryption (S8) ──────────────────────────────────────────
# 32-byte Base64-encoded AES-256 key for email content encryption
app.encryption.key=${ENCRYPTION_KEY}

# ── Follow-up scheduler (F4) ─────────────────────────────────
# Interval in ms to check for due follow-ups (default: 1 hour)
nudge.followup.scheduler.interval-ms=${FOLLOWUP_SCHEDULER_INTERVAL_MS:3600000}

# ── Logging ──────────────────────────────────────────────────
logging.level.com.nudge=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
