# ─────────────────────────────────────────────────────────────
#  Nudge — Production Profile
#  Activate with: -Dspring.profiles.active=prod
#  All secrets MUST be set via environment variables.
# ─────────────────────────────────────────────────────────────

# Production: schema managed by Flyway — never touch it with Hibernate
JPA_DDL_AUTO=validate
FLYWAY_ENABLED=true

# Email notifications enabled in prod
NOTIFICATION_EMAIL_ENABLED=true

# Restrict logging in prod
logging.level.com.nudge=WARN
spring.jpa.show-sql=false
