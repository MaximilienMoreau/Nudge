# ─────────────────────────────────────────────────────────────
#  Nudge Backend — Application Configuration
# ─────────────────────────────────────────────────────────────

# Server
server.port=8080

# ── Database ──────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/nudge
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JWT ───────────────────────────────────────────────────────
# IMPORTANT: Change this secret before deploying to production!
# Must be Base64-encoded and decode to at least 32 bytes (256 bits)
jwt.secret=bXlTZWNyZXRLZXlGb3JOdWRnZUFwcGxpY2F0aW9uVGhhdElzTG9uZ0Vub3VnaA==
# Token expiry: 24 hours in milliseconds
jwt.expiration=86400000

# ── OpenAI ───────────────────────────────────────────────────
# Set via environment variable: export OPENAI_API_KEY=sk-...
openai.api.key=${OPENAI_API_KEY:}
openai.model=gpt-4o-mini

# ── App ───────────────────────────────────────────────────────
# Base URL used to build tracking pixel URLs in emails
app.base.url=http://localhost:8080

# ── Logging ──────────────────────────────────────────────────
logging.level.com.nudge=DEBUG
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
