<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Nudge</title>
  <style>
    :root {
      --primary: #6366f1;
      --bg:      #0f172a;
      --surface: #1e293b;
      --border:  #334155;
      --text:    #f1f5f9;
      --muted:   #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 300px;
      padding: 1rem;
      font-size: 14px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-bottom: 1rem;
      padding-bottom: .75rem;
      border-bottom: 1px solid var(--border);
    }

    .logo { font-size: 1.1rem; font-weight: 700; }
    .tagline { color: var(--muted); font-size: .75rem; }

    .status-row {
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: .6rem .75rem;
      background: var(--surface);
      border-radius: 8px;
      margin-bottom: .75rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      flex-shrink: 0;
    }
    .dot.connected { background: #22c55e; }

    .status-text { flex: 1; font-size: .85rem; }

    /* Login form */
    .form-group { margin-bottom: .65rem; }
    label { display: block; color: var(--muted); font-size: .75rem; margin-bottom: .25rem; text-transform: uppercase; }
    input {
      width: 100%;
      padding: .45rem .7rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: .85rem;
      outline: none;
    }
    input:focus { border-color: var(--primary); }

    .btn {
      display: block;
      width: 100%;
      padding: .55rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: .875rem;
      font-weight: 600;
      margin-top: .75rem;
    }
    .btn:hover { background: #4f46e5; }
    .btn.secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); margin-top: .5rem; }

    .error { color: #ef4444; font-size: .8rem; margin-top: .4rem; }
    .success { color: #22c55e; font-size: .8rem; margin-top: .4rem; }

    .user-info {
      background: var(--surface);
      border-radius: 8px;
      padding: .75rem;
      margin-bottom: .75rem;
      font-size: .85rem;
    }
    .user-info .label { color: var(--muted); font-size: .75rem; margin-bottom: .2rem; }

    .tip {
      background: rgba(99,102,241,.1);
      border: 1px solid rgba(99,102,241,.2);
      border-radius: 8px;
      padding: .6rem .75rem;
      font-size: .8rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="header">
    <span>📨</span>
    <div>
      <div class="logo">Nudge</div>
      <div class="tagline">Email Tracking</div>
    </div>
  </div>

  <!-- Connection status -->
  <div class="status-row">
    <div class="dot" id="status-dot"></div>
    <span class="status-text" id="status-text">Checking…</span>
  </div>

  <!-- Logged OUT view -->
  <div id="login-view">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••"/>
    </div>
    <div id="login-error" class="error hidden"></div>
    <button class="btn" id="login-btn" onclick="login()">Sign In</button>
    <p style="color:var(--muted);font-size:.75rem;margin-top:.5rem;text-align:center">
      Don't have an account? Sign up at the Nudge dashboard.
    </p>
  </div>

  <!-- Logged IN view -->
  <div id="logged-view" class="hidden">
    <div class="user-info">
      <div class="label">Signed in as</div>
      <div id="user-email-display" style="font-weight:600"></div>
    </div>

    <div class="tip">
      ✅ Nudge is active! Compose an email in Gmail — a tracking button will appear next to Send.
    </div>

    <button class="btn secondary" onclick="logout()">Sign Out</button>
    <a href="http://localhost:8080/../dashboard.html" target="_blank" style="display:block;text-align:center;color:var(--primary);font-size:.8rem;margin-top:.6rem;text-decoration:none">
      Open Dashboard ↗
    </a>
  </div>

</body>
<script src="popup.js"></script>
</html>
